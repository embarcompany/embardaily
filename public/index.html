<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>EmbarDaily · CRM</title>
    <link rel="stylesheet" href="/app.css">
    <link rel="stylesheet" href="/dashboard.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><span>EMBARPET · EMBARTRAVEL</span><h1>EmbarDaily</h1><p>Controle pós-embarque</p></div>
      <div class="header-actions">
        <label class="search"><span>⌕</span><input id="search" placeholder="Buscar tutor ou pet"></label>
        <button id="refresh" class="secondary">Atualizar</button>
        <a href="/embarques/novo" class="primary">+ Novo embarque</a>
      </div>
    </header>
    <main>
      <section class="page-intro"><div><p class="eyebrow">PAINEL OPERACIONAL</p><h2>Todos os embarques, no próximo passo certo.</h2><p>Dados lidos diretamente da sua planilha Google.</p></div><div class="data-source"><i></i> Planilha conectada</div></section>
      <section id="summary" class="summary" aria-label="Resumo da operação"></section>
      <section class="toolbar"><label class="toggle"><input id="uncontacted" type="checkbox"><span></span> Somente contato inicial pendente</label><span id="updated-at"></span></section>
      <section id="board" class="board" aria-label="Kanban de clientes"></section>
    </main>
    <dialog id="detail"><button class="close" aria-label="Fechar">×</button><div id="detail-content"></div></dialog>
    <script type="module" src="/app.js"></script>
  </body>
</html>
